<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WQMS - Water Quality Monitoring System</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <header id="header">
            <div class="header-left">
                <h1>🌊 WQMS</h1>
                <span id="system-name">WQMS-System</span>
            </div>
            <div class="header-center">
                <span id="ip-address">0.0.0.0</span>
                <span id="wifi-ssid">N/A</span>
                <span id="datetime">--:--:--</span>
            </div>
            <div class="header-right">
                <span id="free-heap">0 bytes</span>
                <span id="uptime">0m</span>
                <span id="cpu0-load">0%</span>
                <span id="cpu1-load">0%</span>
<!--                <span id="cpu-temp">0°C</span> -->
                <button id="reboot-btn" class="btn btn-danger" style="padding:4px 14px; font-size:0.7rem;">🔁 Reboot</button>
            </div>
        </header>

        <nav id="nav">
            <a href="/" class="active">Dashboard</a>
            <a href="/automation.html">Automation</a>
            <a href="/config.html">Configuration</a>
            <a href="/calibration.html">Calibration</a>
<!--            <a href="/api_doc.html">API Docs</a> -->
        </nav>

        <main id="dashboard">
            <section id="sensors">
                <h2>Sensors</h2>
                <div id="sensor-grid" class="card-grid"></div>
            </section>

            <section id="relays">
                <h2>Relays</h2>
                <div id="relay-grid" class="card-grid relay-card"></div>
            </section>

            <section id="graphs">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <h2 style="margin: 20px 0 12px; border-left: 4px solid #2b7be4; padding-left: 14px;">Sensor History (Last 3 Days)</h2>
                    <button id="chart-toggle-btn" class="btn btn-primary" style="font-size: 0.8rem; padding: 6px 16px;">
                        📊 Show Chart
                    </button>
                </div>
                <div class="sensor-selector hidden" id="sensor-selector"></div>
                <div class="chart-container hidden" id="chart-container">
                    <canvas id="sensor-history-chart" width="100%" height="100%"></canvas>
                </div>
            </section>
        </main>
    </div>

    <!-- Core JS (loaded on all pages) -->
    <script src="/js/core.js"></script>
    <script id="router-script" src="/js/router.js"></script>
    <script src="js/chart.js"></script>
</body>
</html>
