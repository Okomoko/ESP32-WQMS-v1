<!-- web_assets/console.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Console</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app" class="console-page">
        <header id="header">
            <div class="header-left">
                <h1>🌊 WQMS</h1>
                <span id="system-name">WQMS-System</span>
            </div>
            <div class="header-center">
                <span id="ip-address">0.0.0.0</span>
                <span id="wifi-ssid">N/A</span>
                <span id="datetime">--:--:--</span>
            </div>
            <div class="header-right">
                <span id="free-heap">0 bytes</span>
                <span id="uptime">0m</span>
                <span id="cpu0-load">0%</span>
                <span id="cpu1-load">0%</span>
<!--                <span id="cpu-temp">0°C</span> -->
                <button id="reboot-btn" class="btn btn-danger" style="padding:4px 14px; font-size:0.7rem;">🔁 Reboot</button>
            </div>
        </header>
        <!-- Console Header -->
        <div id="console-header">
            <div class="console-title">
                <span class="icon">📋</span>
                <h1>Console Output</h1>
            </div>
            <div class="console-controls">
                <span id="console-status">🟢 <span class="online">Live</span></span>
                <button id="pauseBtn" class="btn active">⏸ Pause</button>
                <button id="clearBtn" class="btn">🗑 Clear</button>
                <button id="downloadBtn" class="btn">💾 Download</button>
            </div>
        </div>

        <!-- Log Content -->
        <div id="console-content">
            <pre id="log"><span style="color: #7a9bbf;">Connecting to console...</span></pre>
        </div>

        <!-- Console Footer -->
        <div id="console-footer">
            <span id="lineCount">Lines: 0</span>
            <span id="updateTime">Updated: --:--:--</span>
            <span id="bufferInfo">Buffer: 0%</span>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script src="/js/console.js"></script>
</body>
</html>
